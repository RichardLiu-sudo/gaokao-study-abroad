<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考分能去哪留学</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh;
  color: #333;
}
.header {
  text-align: center;
  padding: 50px 20px 30px;
  color: #fff;
}
.header h1 { font-size: 2.4em; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
.header p { font-size: 1.1em; opacity: 0.75; }

.input-section {
  max-width: 520px;
  margin: 0 auto 40px;
  padding: 0 20px;
  text-align: center;
}
.input-wrapper {
  display: flex;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.input-wrapper input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 1.5em;
  padding: 18px 24px;
  min-width: 0;
}
.input-wrapper input::placeholder { color: #bbb; }
.input-wrapper button {
  border: none;
  background: linear-gradient(135deg, #e94560, #c23152);
  color: #fff;
  font-size: 1.1em;
  font-weight: 600;
  padding: 18px 28px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.input-wrapper button:hover { opacity: 0.9; }

.result-section {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 120px;
  display: none;
}
.result-section.show { display: block; }

.tier-header {
  color: #fff;
  font-size: 1.5em;
  font-weight: 700;
  margin: 30px 0 8px;
  padding-left: 8px;
  border-left: 4px solid #e94560;
}
.tier-subtitle {
  color: rgba(255,255,255,0.7);
  font-size: 0.95em;
  margin: 0 0 20px;
  padding-left: 12px;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 22px 24px;
  margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  display: flex;
  gap: 18px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
.card-emoji {
  font-size: 2.8em;
  flex-shrink: 0;
  line-height: 1;
}
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 1.15em; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
.card-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 500;
}
.tag-fee { background: #e8f5e9; color: #2e7d32; }
.tag-timeline { background: #e3f2fd; color: #1565c0; }
.tag-condition { background: #fff3e0; color: #e65100; }
.tag-fit { background: #fce4ec; color: #c62828; }

.back-btn-wrap {
  text-align: center;
  margin: 30px 0 20px;
}
.back-btn {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 12px 36px;
  border-radius: 30px;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.25); }

.qr-section {
  text-align: center;
  padding: 30px 20px 160px;
  color: #fff;
}
.qr-section p { font-size: 0.95em; opacity: 0.7; margin-bottom: 14px; }
.qr-section img {
  max-width: 200px;
  width: 100%;
  height: auto;
  border-radius: 12px;
  border: 3px solid rgba(255,255,255,0.2);
  object-fit: contain;
}

.footer-fixed {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #aaa;
  text-align: center;
  padding: 14px 20px;
  font-size: 0.9em;
  line-height: 1.6;
  z-index: 10;
}
.footer-fixed strong { color: #e94560; }

@media (max-width: 600px) {
  .header h1 { font-size: 1.8em; }
  .input-wrapper { flex-direction: column; border-radius: 14px; }
  .input-wrapper input { font-size: 1.2em; padding: 14px 18px; }
  .input-wrapper button { padding: 14px; font-size: 1em; border-radius: 0 0 14px 14px; }
  .card { flex-direction: column; gap: 8px; }
  .card-emoji { font-size: 2.2em; text-align: center; }
}
</style>
</head>
<body>

<div class="header">
  <h1>2026 高考分能去哪留学</h1>
  <p>输入你的高考分数，查看今年（2026 秋季）可入学的留学路径</p>
</div>

<div class="input-section" id="inputSection">
  <div class="input-wrapper">
    <input type="number" id="scoreInput" placeholder="输入你的高考分数（750分制）" min="0" max="750">
    <button onclick="search()">查看我能去哪</button>
  </div>
</div>

<div class="result-section" id="resultSection"></div>

<div class="qr-section">
  <p>需要个性化留学方案？扫码添加微信咨询</p>
  <img src="qrcode.png" alt="微信二维码">
</div>

<div class="footer-fixed">
  仅展示 <strong>2026 年秋季</strong> 可入学方案｜<strong>不限分数</strong>：马来西亚凭高中成绩直申 25-40 万｜爱尔兰无需高考、毕业 3 年工签｜美国社区大学 2+2 随时入学
</div>

<script>
const data = {
  "630+": {
    label: "超特控线 50 分以上",
    subtitle: "核心策略：海外直申世界 TOP50，无需预科，2026 秋季入学",
    emoji: ["🇸🇬","🇭🇰"],
    paths: [
      {name:"新加坡国立大学 / 南洋理工大学", fee:"20-30 万/年", timeline:"6月出分→7月申请→8-9月offer→入学", condition:"高考直申大一，雅思 6.5-7.0", fit:"亚洲顶级教育、英语环境"},
      {name:"香港大学 / 港中文 / 港科大", fee:"25-35 万/年", timeline:"6月出分→月底截止→7月面试→8月offer→9月入学", condition:"独立招生，英语单科 130+，雅思 6.5+", fit:"离家近、英文环境强校"}
    ]
  },
  "520-630": {
    label: "特控线 / 一本线",
    subtitle: "核心策略：名校直申（含 UCAS Clearing 补录），2026 秋季入学",
    emoji: ["🇬🇧","🇭🇰","🇲🇴","🇮🇪"],
    paths: [
      {name:"英国格拉斯哥 / 伯明翰 / 南安普顿 / 利兹", fee:"25-35 万/年", timeline:"6月→7月 UCAS Clearing→8月offer→9月入学", condition:"高考 75%-85%，雅思 6.5", fit:"想去英国但差一点够G5"},
      {name:"香港城市大学 / 理工大学", fee:"18-25 万/年", timeline:"6月出分→7月截止→8月offer→9月入学", condition:"超一本线 80-100 分，雅思 6.5", fit:"离家近、英文环境"},
      {name:"澳门大学 / 澳门科技大学", fee:"12-18 万/年", timeline:"6月出分→7月申请→8月offer→9月入学", condition:"高考直申，雅思 6.0+", fit:"预算适中、喜欢澳门"},
      {name:"爱尔兰圣三一大学 / 都柏林大学", fee:"15-22 万/年", timeline:"6月→7月申请→8月offer→9月入学", condition:"高考 68%-80% 分数，雅思 6.5", fit:"英语国家、毕业 3 年工签"}
    ]
  },
  "430-520": {
    label: "本科线至一本线",
    subtitle: "核心策略：预科 / 国际大一衔接 + 直申，2026 秋季入学",
    emoji: ["🇬🇧","🇮🇪","🇭🇰"],
    paths: [
      {name:"英国曼大 / 布里斯托 / KCL 预科", fee:"20-28 万/年", timeline:"6月→7月申请→8月offer→9月入学预科→次年升本科", condition:"预科 / 国际大一（无需高考），雅思 5.0-6.0", fit:"想去英国但成绩差一点"},
      {name:"爱尔兰圣三一/都柏林预科、高威/科克", fee:"15-22 万/年", timeline:"6月→7月申请→offer→入学", condition:"预科 / 高中成绩直申（无需高考），雅思 5.5-6.5", fit:"英语国家、毕业 3 年工签"},
      {name:"香港恒生大学 / 东华学院", fee:"15-20 万/年", timeline:"6月出分→7月申请→8月offer→9月入学", condition:"二本线直申，雅思 5.5-6.0", fit:"拿香港学位"}
    ]
  },
  "300-430": {
    label: "300 分至本科线",
    subtitle: "核心策略：高性价比预科 / 快捷课程弯道超车，2026 秋季入学",
    emoji: ["🇬🇧","🇺🇸","🇨🇳"],
    paths: [
      {name:"英国皇家霍洛威 / 东英吉利 / 埃塞克斯 预科", fee:"18-25 万/年", timeline:"6月→7月申请→8月offer→9月入学预科", condition:"预科 → 本科（无需高考），雅思 5.0-5.5", fit:"想去英国、不介意预科过渡"},
      {name:"美国社区大学 2+2 转名校", fee:"前两年 15-20 万/年，后两年 30-40 万/年", timeline:"随时申请→语言→入学→2年后转名校大三", condition:"无需高考，雅思 5.5+", fit:"高考失利想逆袭美国名校"},
      {name:"中外合作办学项目", fee:"10-18 万/年（国内阶段）", timeline:"6月→7月申请→9月入学国内", condition:"国内就读，拿海外学位，视项目而定", fit:"想缓冲、降成本、不出国拿学位"}
    ]
  },
  "<300": {
    label: "300 分以下",
    subtitle: "核心策略：低成本国家直申 / 语言过渡，2026 年入学",
    emoji: ["🇲🇾","🇮🇪","🇬🇧","🇦🇺"],
    paths: [
      {name:"马来西亚公立 / 私立双联项目", fee:"全程 25-40 万", timeline:"6月→7月申请→offer→入学", condition:"凭高中成绩直申（无需高考），雅思 5.0-5.5", fit:"最低成本拿英美澳学位"},
      {name:"爱尔兰高威 / 科克 / 利默里克大学", fee:"全程 50-70 万", timeline:"6月→7月申请→offer→入学", condition:"凭高中成绩直申（无需高考），雅思 5.5-6.0", fit:"英语国家、毕业 3 年无条件工签"},
      {name:"英国综合类大学预科", fee:"全程 60-90 万", timeline:"6月→7月申请→8月offer→9月入学预科", condition:"预科 → 本科（无需高考），雅思 5.0-5.5", fit:"预算充足、想去英国"},
      {name:"澳洲 TAFE 职业教育 → 大学", fee:"全程 50-80 万", timeline:"随时申请→入学→技能课程→转学分入大学", condition:"技能课程 → 转学分（无需高考），雅思 5.5+", fit:"走技能路线、转大学"}
    ]
  }
};

function getTier(score) {
  if (score >= 630) return "630+";
  if (score >= 520) return "520-630";
  if (score >= 430) return "430-520";
  if (score >= 300) return "300-430";
  return "<300";
}

function search() {
  var input = document.getElementById("scoreInput");
  var score = parseInt(input.value);
  if (isNaN(score) || score < 0) {
    input.focus();
    input.style.border = "2px solid #e94560";
    setTimeout(function(){ input.style.border = ""; }, 1500);
    return;
  }
  var tier = getTier(score);
  var d = data[tier];

  var html = "";
  html += '<div class="tier-header">' + score + ' 分 — ' + d.label + '</div>';
  html += '<p class="tier-subtitle">' + d.subtitle + '</p>';
  for (var i = 0; i < d.paths.length; i++) {
    var p = d.paths[i];
    html += '<div class="card">';
    html += '<div class="card-emoji">' + d.emoji[i] + '</div>';
    html += '<div class="card-body">';
    html += '<div class="card-title">' + p.name + '</div>';
    html += '<div class="card-row"><span class="tag tag-fee">预估费用：' + p.fee + '</span><span class="tag tag-timeline">时间线：' + p.timeline + '</span></div>';
    html += '<div class="card-row"><span class="tag tag-condition">前置条件：' + p.condition + '</span></div>';
    html += '<div class="card-row"><span class="tag tag-fit">适合谁：' + p.fit + '</span></div>';
    html += '</div></div>';
  }
  html += '<div class="back-btn-wrap"><button class="back-btn" onclick="goBack()">重新输入分数</button></div>';

  var rs = document.getElementById("resultSection");
  rs.innerHTML = html;
  rs.classList.add("show");
  document.getElementById("inputSection").style.display = "none";
  rs.scrollIntoView({ behavior: "smooth" });
}

function goBack() {
  document.getElementById("resultSection").classList.remove("show");
  document.getElementById("resultSection").innerHTML = "";
  document.getElementById("inputSection").style.display = "block";
  document.getElementById("scoreInput").value = "";
  document.getElementById("scoreInput").focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("scoreInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") search();
});
</script>

</body>
</html>
