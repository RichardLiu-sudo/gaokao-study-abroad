<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考分能去哪留学</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh;
  color: #333;
}
.header {
  text-align: center;
  padding: 50px 20px 30px;
  color: #fff;
}
.header h1 { font-size: 2.4em; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
.header p { font-size: 1.1em; opacity: 0.75; }

.input-section {
  max-width: 520px;
  margin: 0 auto 40px;
  padding: 0 20px;
  text-align: center;
}
.input-wrapper {
  display: flex;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.input-wrapper input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 1.5em;
  padding: 18px 24px;
  min-width: 0;
}
.input-wrapper input::placeholder { color: #bbb; }
.input-wrapper button {
  border: none;
  background: linear-gradient(135deg, #e94560, #c23152);
  color: #fff;
  font-size: 1.1em;
  font-weight: 600;
  padding: 18px 28px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.input-wrapper button:hover { opacity: 0.9; }

.result-section {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 120px;
  display: none;
}
.result-section.show { display: block; }

.tier-header {
  color: #fff;
  font-size: 1.5em;
  font-weight: 700;
  margin: 30px 0 16px;
  padding-left: 8px;
  border-left: 4px solid #e94560;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 22px 24px;
  margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  display: flex;
  gap: 18px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
.card-emoji {
  font-size: 2.8em;
  flex-shrink: 0;
  line-height: 1;
}
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 1.15em; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
.card-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 500;
}
.tag-fee { background: #e8f5e9; color: #2e7d32; }
.tag-timeline { background: #e3f2fd; color: #1565c0; }
.tag-condition { background: #fff3e0; color: #e65100; }
.tag-fit { background: #fce4ec; color: #c62828; }

.back-btn-wrap {
  text-align: center;
  margin: 30px 0 20px;
}
.back-btn {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 12px 36px;
  border-radius: 30px;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.25); }

.footer-fixed {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #aaa;
  text-align: center;
  padding: 14px 20px;
  font-size: 0.9em;
  line-height: 1.6;
  z-index: 10;
}
.footer-fixed strong { color: #e94560; }

@media (max-width: 600px) {
  .header h1 { font-size: 1.8em; }
  .input-wrapper { flex-direction: column; border-radius: 14px; }
  .input-wrapper input { font-size: 1.2em; padding: 14px 18px; }
  .input-wrapper button { padding: 14px; font-size: 1em; border-radius: 0 0 14px 14px; }
  .card { flex-direction: column; gap: 8px; }
  .card-emoji { font-size: 2.2em; text-align: center; }
}
</style>
</head>
<body>

<div class="header">

</div>

<div class="input-section" id="inputSection">
  <div class="input-wrapper">
    <input type="number" id="scoreInput" placeholder="输入你的高考分数（750分制）" min="0" max="750">
    <button onclick="search()">查看我能去哪</button>

</div>

<div class="result-section" id="resultSection"></div>

</div>

    paths: [
      {name:"英国格拉斯哥 / 伯明翰 / 南安普顿 / 利兹", fee:"25-35万/年", timeline:"6月→7月申请→8月offer→9月入学", condition:"高考 75%-85%，雅思 6.5", fit:"想去英国但差一点够G5"},

    paths: [
      {name:"英国曼大 / 布里斯托 / KCL 预科", fee:"20-28万/年", timeline:"6月→7月申请→8月offer→9月入学预科→次年升本科", condition:"预科 / 国际大一，雅思 5.0-6.0", fit:"想去英国但成绩差一点"},
      {name:"澳洲悉科大 / 麦考瑞 / RMIT / 伍伦贡", fee:"20-28万/年", timeline:"6月→7月→offer→入学", condition:"二本线直录 / 预科，雅思 5.5-6.5", fit:"想去澳洲但八大够不着"},
      {name:"美国 SUNY 石溪 / UC 河滨 预科", fee:"30-40万/年", timeline:"高考后申请次年秋季", condition:"预科 + 本科，雅思 6.0+", fit:"目标是美国公立强校"},
      {name:"新西兰奥克兰大学 / 怀卡托大学", fee:"15-22万/年", timeline:"6月→7月→offer→入学", condition:"预科 / 直录，雅思 5.5-6.5", fit:"喜欢新西兰、预算适中"},
      {name:"爱尔兰圣三一/都柏林预科、高威/科克", fee:"15-22万/年", timeline:"6月→7月申请→offer→入学", condition:"预科/高中成绩直申（无需高考），雅思 5.5-6.5", fit:"英语国家、毕业 3 年工签"},
      {name:"香港恒生大学 / 东华学院", fee:"15-20万/年", timeline:"6月出分→7月申请→8月offer→9月入学", condition:"二本线直申，雅思 5.5-6.0", fit:"想拿香港学位"},
      {name:"美国贡萨加 / 特拉华 / 旧金山大学 / IIT", fee:"30-45万/年", timeline:"6月→7月申请→offer→入学", condition:"高考直申，高考英语 105-125 可替代托福", fit:"美国直申、部分免语言考试"}
    ]
  },
  "300-430": {
    label: "300 分至本科线",
    subtitle: "核心策略：高性价比预科 / 快捷课程 / 中外合作弯道超车",
    emoji: ["🇦🇺","🇬🇧","🇨🇦","🇺🇸","🇳🇿","🇨🇳"],
    paths: [
      {name:"澳洲南澳 / 迪肯 / 格里菲斯大学", fee:"20-28万/年", timeline:"6月→7月申请→offer→入学", condition:"国际大一（Diploma）→ 大二，雅思 5.5-6.0", fit:"不延长学制、低成本入澳洲"},

function getTier(score) {
  if (score >= 630) return "630+";
  if (score >= 520) return "520-630";
  if (score >= 430) return "430-520";
  if (score >= 300) return "300-430";
  return "<300";
}

function search() {
  var input = document.getElementById("scoreInput");
  var score = parseInt(input.value);
  if (isNaN(score) || score < 0) {
    input.focus();
    input.style.border = "2px solid #e94560";
    setTimeout(function(){ input.style.border = ""; }, 1500);
    return;
  }
  var tier = getTier(score);
  var d = data[tier];

  var html = "";
  html += '<div class="tier-header">' + score + ' 分 — ' + d.label + '</div>';
  html += '<p style="color:rgba(255,255,255,0.7);font-size:0.95em;margin:-8px 0 20px;padding-left:12px;">' + d.subtitle + '</p>';
  for (var i = 0; i < d.paths.length; i++) {
    var p = d.paths[i];
    html += '<div class="card">';
    html += '<div class="card-emoji">' + d.emoji[i] + '</div>';
    html += '<div class="card-body">';
    html += '<div class="card-title">' + p.name + '</div>';
    html += '<div class="card-row"><span class="tag tag-fee">预估费用：' + p.fee + '</span><span class="tag tag-timeline">时间线：' + p.timeline + '</span></div>';
    html += '<div class="card-row"><span class="tag tag-condition">前置条件：' + p.condition + '</span></div>';
    html += '<div class="card-row"><span class="tag tag-fit">适合谁：' + p.fit + '</span></div>';
    html += '</div></div>';
  }
  html += '<div class="back-btn-wrap"><button class="back-btn" onclick="goBack()">重新输入分数</button></div>';

  var rs = document.getElementById("resultSection");
  rs.innerHTML = html;
  rs.classList.add("show");
  document.getElementById("inputSection").style.display = "none";
  rs.scrollIntoView({ behavior: "smooth" });
}

function goBack() {
  document.getElementById("resultSection").classList.remove("show");
  document.getElementById("resultSection").innerHTML = "";
  document.getElementById("inputSection").style.display = "block";
  document.getElementById("scoreInput").value = "";
  document.getElementById("scoreInput").focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("scoreInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") search();
});
</script>

</body>
</html>
